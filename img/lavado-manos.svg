<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <marker id="a2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2980b9"/>
    </marker>
    <style>
      .title { font-family: system-ui; font-size: 15px; font-weight: 700; fill: #2c3e50; text-anchor: middle; }
      .num { font-family: system-ui; font-size: 16px; font-weight: 700; fill: #fff; text-anchor: middle; }
      .desc { font-family: system-ui; font-size: 10px; fill: #2c3e50; text-anchor: middle; font-weight: 600; }
      .detail { font-family: system-ui; font-size: 9px; fill: #5d6d7e; text-anchor: middle; }
    </style>
  </defs>
  <text x="400" y="22" class="title">Técnica de Lavado de Manos — 6 Pasos (OMS)</text>

  <!-- Step 1 -->
  <circle cx="65" cy="85" r="28" fill="#2980b9"/>
  <text x="65" y="91" class="num">1</text>
  <text x="65" y="130" class="desc">Mojar y jabón</text>
  <text x="65" y="143" class="detail">Agua tibia</text>
  <line x1="98" y1="85" x2="122" y2="85" stroke="#2980b9" stroke-width="1.5" marker-end="url(#a2)"/>

  <!-- Step 2 -->
  <circle cx="148" cy="85" r="28" fill="#2980b9"/>
  <text x="148" y="91" class="num">2</text>
  <text x="148" y="130" class="desc">Palmas</text>
  <text x="148" y="143" class="detail">Frotar entre sí</text>
  <line x1="181" y1="85" x2="205" y2="85" stroke="#2980b9" stroke-width="1.5" marker-end="url(#a2)"/>

  <!-- Step 3 -->
  <circle cx="231" cy="85" r="28" fill="#2980b9"/>
  <text x="231" y="91" class="num">3</text>
  <text x="231" y="130" class="desc">Dorso de manos</text>
  <text x="231" y="143" class="detail">Interdigitales</text>
  <line x1="264" y1="85" x2="288" y2="85" stroke="#2980b9" stroke-width="1.5" marker-end="url(#a2)"/>

  <!-- Step 4 -->
  <circle cx="314" cy="85" r="28" fill="#2980b9"/>
  <text x="314" y="91" class="num">4</text>
  <text x="314" y="130" class="desc">Dedos entrelazados</text>
  <text x="314" y="143" class="detail">Palmas</text>
  <line x1="347" y1="85" x2="371" y2="85" stroke="#2980b9" stroke-width="1.5" marker-end="url(#a2)"/>

  <!-- Step 5 -->
  <circle cx="397" cy="85" r="28" fill="#2980b9"/>
  <text x="397" y="91" class="num">5</text>
  <text x="397" y="130" class="desc">Dorso dedos</text>
  <text x="397" y="143" class="detail">Contra palma</text>
  <line x1="430" y1="85" x2="454" y2="85" stroke="#2980b9" stroke-width="1.5" marker-end="url(#a2)"/>

  <!-- Step 6 -->
  <circle cx="480" cy="85" r="28" fill="#2980b9"/>
  <text x="480" y="91" class="num">6</text>
  <text x="480" y="130" class="desc">Pulgar + uñas</text>
  <text x="480" y="143" class="detail">Rotación</text>
  <line x1="513" y1="85" x2="537" y2="85" stroke="#2980b9" stroke-width="1.5" marker-end="url(#a2)"/>

  <!-- Finish -->
  <circle cx="563" cy="85" r="28" fill="#27ae60"/>
  <text x="563" y="85" class="num" style="font-size:20px">✓</text>
  <text x="563" y="130" class="desc">Enjuagar</text>
  <text x="563" y="143" class="detail">Secar</text>

  <!-- Info box -->
  <rect x="630" y="50" width="155" height="110" rx="8" fill="#f8f9fa" stroke="#dce1e8" stroke-width="1"/>
  <text x="707" y="72" class="desc" fill="#2c3e50">Duración: 40-60 seg</text>
  <text x="707" y="92" class="detail">Social: 15-20s</text>
  <text x="707" y="107" class="detail">Quirúrgico: 2-5min</text>
  <text x="707" y="122" class="detail">Frictionado: 20-30s</text>
  <text x="707" y="142" class="detail" fill="#e74c3c" font-weight="600">Gel alcoholico 60-70%</text>

  <text x="400" y="185" font-family="system-ui" font-size="10" fill="#5d6d7e" text-anchor="middle">Antes y después de cada paciente · Con agua abundante y jabón</text>
</svg>
