<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <style>
      text { font-family: system-ui, sans-serif; }
    </style>
  </defs>

  <text x="400" y="25" font-size="18" font-weight="700" fill="#2c3e50" text-anchor="middle">Jerarquía Normativa de SST en Ecuador</text>

  <!-- Pirámide -->
  <!-- Nivel 1 - Constitución -->
  <polygon points="400,55 300,110 500,110" fill="#9b59b6" stroke="#7d3c98" stroke-width="2"/>
  <text x="400" y="95" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Constitución</text>
  <text x="400" y="108" font-size="9" fill="#fff" text-anchor="middle" opacity="0.8">Art. 328</text>

  <!-- Nivel 2 - Ley Orgánica -->
  <polygon points="300,115 230,170 570,170 500,115" fill="#8e44ad" stroke="#7d3c98" stroke-width="1.5"/>
  <text x="400" y="148" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Ley Orgánica de SST</text>

  <!-- Nivel 3 - DS-2013 -->
  <polygon points="230,175 160,230 640,230 570,175" fill="#2980b9" stroke="#2471a3" stroke-width="1.5"/>
  <text x="400" y="210" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">DS-2013 Reglamento de SST</text>

  <!-- Nivel 4 - Acuerdos Ministeriales -->
  <polygon points="160,235 80,290 720,290 640,235" fill="#27ae60" stroke="#1e8449" stroke-width="1.5"/>
  <text x="400" y="268" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Acuerdos Ministeriales del MSP</text>
  <text x="400" y="283" font-size="9" fill="#fff" text-anchor="middle" opacity="0.8">Protocolos, normas técnicas, guías</text>

  <!-- Lado derecho - descripciones -->
  <g transform="translate(520,55)">
    <rect x="0" y="0" width="260" height="45" rx="6" fill="#f3f0ff" stroke="#9b59b6" stroke-width="1"/>
    <text x="10" y="18" font-size="10" fill="#2c3e50" font-weight="600">Derecho al trabajo digno y seguro</text>
    <text x="10" y="33" font-size="9" fill="#5d6d7e">Máxima jerarquía normativa</text>
  </g>
  <line x1="500" y1="90" x2="520" y2="78" stroke="#9b59b6" stroke-width="1" stroke-dasharray="3,3"/>

  <g transform="translate(520,120)">
    <rect x="0" y="0" width="260" height="45" rx="6" fill="#f3f0ff" stroke="#8e44ad" stroke-width="1"/>
    <text x="10" y="18" font-size="10" fill="#2c3e50" font-weight="600">Obligaciones empleador + derechos trabajador</text>
    <text x="10" y="33" font-size="9" fill="#5d6d7e">Capacitación, EPP, vigilancia médica</text>
  </g>
  <line x1="500" y1="145" x2="520" y2="143" stroke="#8e44ad" stroke-width="1" stroke-dasharray="3,3"/>

  <g transform="translate(520,185)">
    <rect x="0" y="0" width="260" height="45" rx="6" fill="#eaf2f8" stroke="#2980b9" stroke-width="1"/>
    <text x="10" y="18" font-size="10" fill="#2c3e50" font-weight="600">Evaluación de riesgos, comités SST</text>
    <text x="10" y="33" font-size="9" fill="#5d6d7e">Investigación de accidentes, registros</text>
  </g>
  <line x1="500" y1="200" x2="520" y2="208" stroke="#2980b9" stroke-width="1" stroke-dasharray="3,3"/>

  <g transform="translate(520,250)">
    <rect x="0" y="0" width="260" height="45" rx="6" fill="#eafaf1" stroke="#27ae60" stroke-width="1"/>
    <text x="10" y="18" font-size="10" fill="#2c3e50" font-weight="600">Protocolos bioseguridad, Kit Púrpura</text>
    <text x="10" y="33" font-size="9" fill="#5d6d7e">Residuos, esterilización, normas técnicas</text>
  </g>
  <line x1="500" y1="260" x2="520" y2="273" stroke="#27ae60" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Código del Trabajo -->
  <rect x="80" y="310" width="640" height="30" rx="6" fill="#f8f9fa" stroke="#dce1e8" stroke-width="1"/>
  <text x="400" y="330" font-size="11" fill="#5d6d7e" text-anchor="middle">Código del Trabajo: Jornada 8h/40h sem · Descansos · Protección maternidad</text>
</svg>
