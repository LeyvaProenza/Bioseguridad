<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 180">
  <defs>
    <marker id="ae" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3498db"/>
    </marker>
  </defs>
  <text x="410" y="22" font-family="system-ui" font-size="16" font-weight="700" fill="#2c3e50" text-anchor="middle">Cadena de Esterilización (9 Pasos)</text>

  <!-- Paso 1 -->
  <rect x="5" y="45" width="75" height="65" rx="8" fill="#e74c3c"/>
  <text x="42" y="68" font-family="system-ui" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">1</text>
  <text x="42" y="85" font-family="system-ui" font-size="8" font-weight="600" fill="#fff" text-anchor="middle">USO</text>
  <text x="42" y="98" font-family="system-ui" font-size="7" fill="#fdedec" text-anchor="middle">Contaminación</text>
  <line x1="83" y1="77" x2="97" y2="77" stroke="#3498db" stroke-width="1.5" marker-end="url(#ae)"/>

  <!-- Paso 2 -->
  <rect x="100" y="45" width="75" height="65" rx="8" fill="#e67e22"/>
  <text x="137" y="68" font-family="system-ui" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">2</text>
  <text x="137" y="85" font-family="system-ui" font-size="8" font-weight="600" fill="#fff" text-anchor="middle">TRANSPORTE</text>
  <text x="137" y="98" font-family="system-ui" font-size="7" fill="#fef9e7" text-anchor="middle">Recipiente cerrado</text>
  <line x1="178" y1="77" x2="192" y2="77" stroke="#3498db" stroke-width="1.5" marker-end="url(#ae)"/>

  <!-- Paso 3 -->
  <rect x="195" y="45" width="75" height="65" rx="8" fill="#f39c12"/>
  <text x="232" y="68" font-family="system-ui" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">3</text>
  <text x="232" y="85" font-family="system-ui" font-size="8" font-weight="600" fill="#fff" text-anchor="middle">LIMPIEZA</text>
  <text x="232" y="98" font-family="system-ui" font-size="7" fill="#fef9e7" text-anchor="middle">CRÍTICO ★</text>
  <line x1="273" y1="77" x2="287" y2="77" stroke="#3498db" stroke-width="1.5" marker-end="url(#ae)"/>

  <!-- Paso 4 -->
  <rect x="290" y="45" width="75" height="65" rx="8" fill="#27ae60"/>
  <text x="327" y="68" font-family="system-ui" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">4</text>
  <text x="327" y="85" font-family="system-ui" font-size="8" font-weight="600" fill="#fff" text-anchor="middle">ENJUAGUE</text>
  <text x="327" y="98" font-family="system-ui" font-size="7" fill="#eafaf1" text-anchor="middle">Agua destilada</text>
  <line x1="368" y1="77" x2="382" y2="77" stroke="#3498db" stroke-width="1.5" marker-end="url(#ae)"/>

  <!-- Paso 5 -->
  <rect x="385" y="45" width="75" height="65" rx="8" fill="#2980b9"/>
  <text x="422" y="68" font-family="system-ui" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">5</text>
  <text x="422" y="85" font-family="system-ui" font-size="8" font-weight="600" fill="#fff" text-anchor="middle">SECADO</text>
  <text x="422" y="98" font-family="system-ui" font-size="7" fill="#d6eaf8" text-anchor="middle">Toalla/aire</text>
  <line x1="463" y1="77" x2="477" y2="77" stroke="#3498db" stroke-width="1.5" marker-end="url(#ae)"/>

  <!-- Paso 6 -->
  <rect x="480" y="45" width="75" height="65" rx="8" fill="#8e44ad"/>
  <text x="517" y="68" font-family="system-ui" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">6</text>
  <text x="517" y="85" font-family="system-ui" font-size="8" font-weight="600" fill="#fff" text-anchor="middle">EMPAQUE</text>
  <text x="517" y="98" font-family="system-ui" font-size="7" fill="#ebdef0" text-anchor="middle">+ indicador</text>
  <line x1="558" y1="77" x2="572" y2="77" stroke="#3498db" stroke-width="1.5" marker-end="url(#ae)"/>

  <!-- Paso 7 -->
  <rect x="575" y="45" width="75" height="65" rx="8" fill="#1abc9c"/>
  <text x="612" y="68" font-family="system-ui" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">7</text>
  <text x="612" y="85" font-family="system-ui" font-size="8" font-weight="600" fill="#fff" text-anchor="middle">AUTOCLAVE</text>
  <text x="612" y="98" font-family="system-ui" font-size="7" fill="#e8f8f5" text-anchor="middle">121°C / 15lb</text>
  <line x1="653" y1="77" x2="667" y2="77" stroke="#3498db" stroke-width="1.5" marker-end="url(#ae)"/>

  <!-- Paso 8 -->
  <rect x="670" y="45" width="70" height="65" rx="8" fill="#34495e"/>
  <text x="705" y="68" font-family="system-ui" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">8</text>
  <text x="705" y="85" font-family="system-ui" font-size="8" font-weight="600" fill="#fff" text-anchor="middle">ALMACÉN</text>
  <text x="705" y="98" font-family="system-ui" font-size="7" fill="#d5dbdb" text-anchor="middle">Limpio/seco</text>

  <!-- Paso 9 -->
  <rect x="5" y="125" width="75" height="40" rx="8" fill="#2c3e50"/>
  <text x="42" y="150" font-family="system-ui" font-size="10" font-weight="600" fill="#fff" text-anchor="middle">9. USO ASÉPTICO</text>

  <!-- Flecha de retorno -->
  <line x1="83" y1="145" x2="83" y2="112" stroke="#3498db" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="83" y1="112" x2="42" y2="112" stroke="#3498db" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="42" y1="112" x2="42" y2="125" stroke="#3498db" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Nota -->
  <text x="400" y="175" font-family="system-ui" font-size="9" fill="#e74c3c" text-anchor="middle" font-weight="600">Paso 3 (Limpieza) es el más crítico: los restos orgánicos protegen a los microorganismos del agente esterilizante</text>
</svg>
