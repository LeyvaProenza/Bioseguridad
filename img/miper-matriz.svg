<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320">
  <defs>
    <style>
      text { font-family: system-ui, sans-serif; }
    </style>
  </defs>

  <text x="400" y="25" font-size="18" font-weight="700" fill="#2c3e50" text-anchor="middle">Matriz de Peligros y Evaluación de Riesgos (MIPER)</text>

  <!-- Paso 1 -->
  <rect x="20" y="55" width="170" height="100" rx="10" fill="#e74c3c"/>
  <text x="105" y="80" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">1. IDENTIFICAR</text>
  <text x="105" y="100" font-size="10" fill="#fff" text-anchor="middle" opacity="0.9">Peligros por categoría:</text>
  <text x="30" y="118" font-size="9" fill="#fff">• Biológicos</text>
  <text x="30" y="131" font-size="9" fill="#fff">• Químicos</text>
  <text x="105" y="118" font-size="9" fill="#fff">• Físicos</text>
  <text x="105" y="131" font-size="9" fill="#fff">• Ergonómicos</text>
  <text x="170" y="118" font-size="9" fill="#fff">• Psicosociales</text>

  <!-- Flecha -->
  <line x1="195" y1="105" x2="215" y2="105" stroke="#5d6d7e" stroke-width="2" marker-end="url(#a3)"/>

  <!-- Paso 2 -->
  <rect x="220" y="55" width="170" height="100" rx="10" fill="#e67e22"/>
  <text x="305" y="80" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">2. EVALUAR</text>
  <text x="305" y="100" font-size="10" fill="#fff" text-anchor="middle" opacity="0.9">Riesgo =</text>
  <text x="305" y="118" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">Probabilidad × Impacto</text>
  <text x="305" y="140" font-size="9" fill="#fff" text-anchor="middle">Escala 1-5 cada factor</text>

  <!-- Flecha -->
  <line x1="395" y1="105" x2="415" y2="105" stroke="#5d6d7e" stroke-width="2" marker-end="url(#a3)"/>

  <!-- Paso 3 -->
  <rect x="420" y="55" width="170" height="100" rx="10" fill="#f39c12"/>
  <text x="505" y="80" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">3. CONTROLAR</text>
  <text x="505" y="100" font-size="10" fill="#fff" text-anchor="middle" opacity="0.9">Jerarquía de controles:</text>
  <text x="430" y="118" font-size="9" fill="#fff">① Eliminación</text>
  <text x="430" y="131" font-size="9" fill="#fff">② Sustitución</text>
  <text x="530" y="118" font-size="9" fill="#fff">③ Ingeniería</text>
  <text x="530" y="131" font-size="9" fill="#fff">④ Administrativos</text>
  <text x="505" y="147" font-size="9" fill="#fff">⑤ EPP (última línea)</text>

  <!-- Flecha -->
  <line x1="595" y1="105" x2="615" y2="105" stroke="#5d6d7e" stroke-width="2" marker-end="url(#a3)"/>

  <!-- Paso 4 -->
  <rect x="620" y="55" width="160" height="100" rx="10" fill="#27ae60"/>
  <text x="700" y="80" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">4. REVISAR</text>
  <text x="700" y="100" font-size="10" fill="#fff" text-anchor="middle" opacity="0.9">Verificar efectividad</text>
  <text x="630" y="118" font-size="9" fill="#fff">• Reevaluar anual</text>
  <text x="630" y="131" font-size="9" fill="#fff">• Cambios en procesos</text>
  <text x="630" y="144" font-size="9" fill="#fff">• Nuevos equipos</text>

  <!-- Matriz de ejemplo -->
  <rect x="20" y="180" width="760" height="130" rx="10" fill="#f8f9fa" stroke="#dce1e8" stroke-width="1"/>
  <text x="400" y="205" font-size="13" font-weight="700" fill="#2c3e50" text-anchor="middle">Ejemplo: Pinchazo con aguja en consultorio dental</text>

  <!-- Tabla -->
  <rect x="40" y="218" width="140" height="25" rx="3" fill="#e74c3c"/>
  <text x="110" y="235" font-size="10" font-weight="600" fill="#fff" text-anchor="middle">Peligro: Pinchazo</text>
  <rect x="190" y="218" width="120" height="25" rx="3" fill="#e67e22"/>
  <text x="250" y="235" font-size="10" font-weight="600" fill="#fff" text-anchor="middle">Probabilidad: 4</text>
  <rect x="320" y="218" width="120" height="25" rx="3" fill="#f39c12"/>
  <text x="380" y="235" font-size="10" font-weight="600" fill="#fff" text-anchor="middle">Impacto: 5</text>
  <rect x="450" y="218" width="100" height="25" rx="3" fill="#9b59b6"/>
  <text x="500" y="235" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">Riesgo: 20</text>
  <rect x="560" y="218" width="200" height="25" rx="3" fill="#27ae60"/>
  <text x="660" y="235" font-size="10" font-weight="600" fill="#fff" text-anchor="middle">Control: EPP + contenedor</text>

  <text x="400" y="275" font-size="11" fill="#5d6d7e" text-anchor="middle">Revisar al menos anualmente o cuando cambien procesos, equipos o personal</text>
  <text x="400" y="295" font-size="10" fill="#9b59b6" text-anchor="middle" font-weight="600">Obligatorio según DS-2013 · Disponible para inspección del MT</text>
</svg>
