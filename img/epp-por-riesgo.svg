<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280">
  <text x="400" y="25" font-family="system-ui" font-size="17" font-weight="700" fill="#2c3e50" text-anchor="middle">EPP Según Nivel de Riesgo del Procedimiento</text>

  <!-- Bajo -->
  <rect x="10" y="45" width="250" height="210" rx="12" fill="#27ae60"/>
  <text x="135" y="75" font-family="system-ui" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">● BAJO RIESGO</text>
  <text x="135" y="95" font-family="system-ui" font-size="10" fill="#d5f5e3" text-anchor="middle">Sin aerosoles</text>
  <line x1="30" y1="105" x2="240" y2="105" stroke="#fff" stroke-opacity="0.3"/>
  <text x="30" y="125" font-family="system-ui" font-size="10" fill="#eafaf1">Consulta general</text>
  <text x="30" y="140" font-family="system-ui" font-size="10" fill="#eafaf1">Radiografías</text>
  <text x="30" y="155" font-family="system-ui" font-size="10" fill="#eafaf1">Impresiones</text>
  <text x="30" y="170" font-family="system-ui" font-size="10" fill="#eafaf1">Fluoruros, selladores</text>
  <rect x="30" y="185" width="200" height="55" rx="6" fill="#1e8449"/>
  <text x="130" y="205" font-family="system-ui" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">EPP Requerido:</text>
  <text x="130" y="222" font-family="system-ui" font-size="10" fill="#fff" text-anchor="middle">Guantes + Mascarilla + Gafas</text>

  <!-- Moderado -->
  <rect x="275" y="45" width="250" height="210" rx="12" fill="#f39c12"/>
  <text x="400" y="75" font-family="system-ui" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">● MODERADO</text>
  <text x="400" y="95" font-family="system-ui" font-size="10" fill="#fef9e7" text-anchor="middle">Con aerosoles</text>
  <line x1="295" y1="105" x2="505" y2="105" stroke="#fff" stroke-opacity="0.3"/>
  <text x="295" y="125" font-family="system-ui" font-size="10" fill="#fef9e7">Limpieza ultrasonido</text>
  <text x="295" y="140" font-family="system-ui" font-size="10" fill="#fef9e7">Operatoria turbine</text>
  <text x="295" y="155" font-family="system-ui" font-size="10" fill="#fef9e7">Endodoncia</text>
  <text x="295" y="170" font-family="system-ui" font-size="10" fill="#fef9e7">Odontopediatría</text>
  <rect x="295" y="185" width="200" height="55" rx="6" fill="#d68910"/>
  <text x="395" y="205" font-family="system-ui" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">EPP Requerido:</text>
  <text x="395" y="222" font-family="system-ui" font-size="10" fill="#fff" text-anchor="middle">+ N95/FFP2 + Cofia + Bata</text>

  <!-- Alto -->
  <rect x="540" y="45" width="250" height="210" rx="12" fill="#e74c3c"/>
  <text x="665" y="75" font-family="system-ui" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">● ALTO RIESGO</text>
  <text x="665" y="95" font-family="system-ui" font-size="10" fill="#fdedec" text-anchor="middle">Quirúrgico</text>
  <line x1="560" y1="105" x2="770" y2="105" stroke="#fff" stroke-opacity="0.3"/>
  <text x="560" y="125" font-family="system-ui" font-size="10" fill="#fdedec">Cirugía oral</text>
  <text x="560" y="140" font-family="system-ui" font-size="10" fill="#fdedec">Exodoncia, implantes</text>
  <text x="560" y="155" font-family="system-ui" font-size="10" fill="#fdedec">Osteotomías</text>
  <text x="560" y="170" font-family="system-ui" font-size="10" fill="#fdedec">Endodoncia + ultrasonido</text>
  <rect x="560" y="185" width="200" height="55" rx="6" fill="#c0392b"/>
  <text x="660" y="205" font-family="system-ui" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">EPP Requerido:</text>
  <text x="660" y="222" font-family="system-ui" font-size="10" fill="#fff" text-anchor="middle">+ Guantes dobles + Pantalla + Mandil</text>
</svg>
