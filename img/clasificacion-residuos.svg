<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280">
  <defs>
    <style>
      .title { font-family: system-ui; font-size: 16px; font-weight: 700; fill: #2c3e50; text-anchor: middle; }
      .cat-label { font-family: system-ui; font-size: 12px; font-weight: 700; fill: #fff; text-anchor: middle; }
      .cat-items { font-family: system-ui; font-size: 10px; fill: #2c3e50; text-anchor: middle; }
      .container { rx: 8; ry: 8; }
    </style>
  </defs>
  <text x="400" y="25" class="title">Clasificación de Residuos Biosanitarios — MSP Ecuador</text>

  <!-- Infecciosos - ROJO -->
  <rect x="20" y="50" width="140" height="180" class="container" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <rect x="55" y="60" width="70" height="50" rx="4" fill="#c0392b"/>
  <text x="90" y="82" class="cat-label">CONTENEDOR</text>
  <text x="90" y="96" class="cat-label">ROJO</text>
  <text x="90" y="135" class="cat-label">INFECTIOSOS</text>
  <text x="90" y="155" class="cat-items">Gasas con sangre</text>
  <text x="90" y="170" class="cat-items">Guantes usados</text>
  <text x="90" y="185" class="cat-items">Material descartable</text>
  <text x="90" y="200" class="cat-items">Drenes</text>
  <text x="90" y="215" class="cat-items">Compresas</text>

  <!-- Cortopunzantes - AMARILLO -->
  <rect x="175" y="50" width="140" height="180" class="container" fill="#f1c40f" stroke="#f39c12" stroke-width="2"/>
  <rect x="210" y="60" width="70" height="50" rx="4" fill="#d4ac0d"/>
  <text x="245" y="82" class="cat-label" fill="#2c3e50">CONTENEDOR</text>
  <text x="245" y="96" class="cat-label" fill="#2c3e50">AMARILLO</text>
  <text x="245" y="135" class="cat-label" fill="#2c3e50">CORTOPUNZANTES</text>
  <text x="245" y="155" class="cat-items">Agujas</text>
  <text x="245" y="170" class="cat-items">Bisturís</text>
  <text x="245" y="185" class="cat-items">Brocas</text>
  <text x="245" y="200" class="cat-items">Limas</text>
  <text x="245" y="215" class="cat-items">≤ ¾ lleno</text>

  <!-- Químicos - GRIS -->
  <rect x="330" y="50" width="140" height="180" class="container" fill="#7f8c8d" stroke="#6c7a7d" stroke-width="2"/>
  <rect x="365" y="60" width="70" height="50" rx="4" fill="#6c7a7d"/>
  <text x="400" y="82" class="cat-label">CONTENEDOR</text>
  <text x="400" y="96" class="cat-label">GRIS</text>
  <text x="400" y="135" class="cat-label">QUÍMICOS</text>
  <text x="400" y="155" class="cat-items">Solventes</text>
  <text x="400" y="170" class="cat-items">Amalgama</text>
  <text x="400" y="185" class="cat-items">Reactivos</text>
  <text x="400" y="200" class="cat-items">Ácidos</text>
  <text x="400" y="215" class="cat-items">Formaldehído</text>

  <!-- Farmacéuticos - AZUL -->
  <rect x="485" y="50" width="140" height="180" class="container" fill="#2980b9" stroke="#2471a3" stroke-width="2"/>
  <rect x="520" y="60" width="70" height="50" rx="4" fill="#2471a3"/>
  <text x="555" y="82" class="cat-label">CONTENEDOR</text>
  <text x="555" y="96" class="cat-label">AZUL</text>
  <text x="555" y="135" class="cat-label">FARMACÉUTICOS</text>
  <text x="555" y="155" class="cat-items">Medicamentos</text>
  <text x="555" y="170" class="cat-items">vencidos</text>
  <text x="555" y="185" class="cat-items">Vacunas</text>
  <text x="555" y="200" class="cat-items">Antibióticos</text>
  <text x="555" y="215" class="cat-items">no utilizados</text>

  <!-- Generales - NEGRO -->
  <rect x="640" y="50" width="140" height="180" class="container" fill="#2c3e50" stroke="#1a252f" stroke-width="2"/>
  <rect x="675" y="60" width="70" height="50" rx="4" fill="#1a252f"/>
  <text x="710" y="82" class="cat-label">CONTENEDOR</text>
  <text x="710" y="96" class="cat-label">NEGRO</text>
  <text x="710" y="135" class="cat-label">GENERALES</text>
  <text x="710" y="155" class="cat-items">Papel</text>
  <text x="710" y="170" class="cat-items">Cartón</text>
  <text x="710" y="185" class="cat-items">Envases</text>
  <text x="710" y="200" class="cat-items">no</text>
  <text x="710" y="215" class="cat-items">contaminados</text>

  <!-- Footer -->
  <text x="400" y="265" font-family="system-ui" font-size="11" fill="#5d6d7e" text-anchor="middle">Separación obligatoria en origen · Transporte en carros cerrados · Máx. 48h almacenamiento</text>
</svg>
