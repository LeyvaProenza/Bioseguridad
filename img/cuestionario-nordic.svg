<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280">
  <text x="400" y="25" font-family="system-ui" font-size="17" font-weight="700" fill="#2c3e50" text-anchor="middle">Cuestionario NORDIC — Regiones Corporales Evaluadas</text>

  <!-- Cuerpo esquemático -->
  <g transform="translate(300,60)">
    <!-- Cabeza -->
    <circle cx="50" cy="20" r="18" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
    <!-- Cuello -->
    <rect x="40" y="38" width="20" height="15" rx="3" fill="#f39c12" stroke="#e67e22" stroke-width="1"/>
    <text x="50" y="49" font-family="system-ui" font-size="7" fill="#fff" text-anchor="middle">Cuello</text>
    <!-- Hombros -->
    <ellipse cx="15" cy="65" rx="18" ry="10" fill="#e74c3c" stroke="#c0392b" stroke-width="1"/>
    <ellipse cx="85" cy="65" rx="18" ry="10" fill="#e74c3c" stroke="#c0392b" stroke-width="1"/>
    <text x="15" y="68" font-family="system-ui" font-size="6" fill="#fff" text-anchor="middle">Homb.</text>
    <text x="85" y="68" font-family="system-ui" font-size="6" fill="#fff" text-anchor="middle">Homb.</text>
    <!-- Espalda alta -->
    <rect x="30" y="55" width="40" height="30" rx="4" fill="#e67e22" stroke="#d35400" stroke-width="1"/>
    <text x="50" y="73" font-family="system-ui" font-size="7" fill="#fff" text-anchor="middle">Esp. alta</text>
    <!-- Brazos -->
    <rect x="-5" y="75" width="12" height="35" rx="4" fill="#f39c12" stroke="#e67e22" stroke-width="1"/>
    <rect x="93" y="75" width="12" height="35" rx="4" fill="#f39c12" stroke="#e67e22" stroke-width="1"/>
    <text x="1" y="95" font-family="system-ui" font-size="5" fill="#fff" text-anchor="middle">Codo</text>
    <text x="99" y="95" font-family="system-ui" font-size="5" fill="#fff" text-anchor="middle">Codo</text>
    <!-- Manos -->
    <rect x="-10" y="110" width="16" height="12" rx="3" fill="#9b59b6" stroke="#8e44ad" stroke-width="1"/>
    <rect x="94" y="110" width="16" height="12" rx="3" fill="#9b59b6" stroke="#8e44ad" stroke-width="1"/>
    <text x="-2" y="119" font-family="system-ui" font-size="5" fill="#fff" text-anchor="middle">Mun.</text>
    <text x="102" y="119" font-family="system-ui" font-size="5" fill="#fff" text-anchor="middle">Mun.</text>
    <!-- Espalda baja -->
    <rect x="30" y="87" width="40" height="25" rx="4" fill="#e74c3c" stroke="#c0392b" stroke-width="1"/>
    <text x="50" y="103" font-family="system-ui" font-size="7" fill="#fff" text-anchor="middle">Esp. baja</text>
    <!-- Caderas -->
    <ellipse cx="35" cy="125" rx="15" ry="8" fill="#3498db" stroke="#2980b9" stroke-width="1"/>
    <ellipse cx="65" cy="125" rx="15" ry="8" fill="#3498db" stroke="#2980b9" stroke-width="1"/>
    <text x="50" y="128" font-family="system-ui" font-size="6" fill="#fff" text-anchor="middle">Cadera</text>
    <!-- Rodillas -->
    <circle cx="35" cy="155" r="10" fill="#27ae60" stroke="#1e8449" stroke-width="1"/>
    <circle cx="65" cy="155" r="10" fill="#27ae60" stroke="#1e8449" stroke-width="1"/>
    <text x="35" y="158" font-family="system-ui" font-size="6" fill="#fff" text-anchor="middle">Rod.</text>
    <text x="65" y="158" font-family="system-ui" font-size="6" fill="#fff" text-anchor="middle">Rod.</text>
    <!-- Tobillos -->
    <rect x="27" y="170" width="14" height="10" rx="3" fill="#1abc9c" stroke="#16a085" stroke-width="1"/>
    <rect x="59" y="170" width="14" height="10" rx="3" fill="#1abc9c" stroke="#16a085" stroke-width="1"/>
    <text x="34" y="178" font-family="system-ui" font-size="5" fill="#fff" text-anchor="middle">Tob.</text>
    <text x="66" y="178" font-family="system-ui" font-size="5" fill="#fff" text-anchor="middle">Tob.</text>
  </g>

  <!-- Leyenda -->
  <g transform="translate(520,60)">
    <text x="0" y="15" font-family="system-ui" font-size="12" font-weight="700" fill="#2c3e50">9 Regiones evaluadas:</text>

    <rect x="0" y="30" width="14" height="14" rx="3" fill="#f39c12"/>
    <text x="22" y="41" font-family="system-ui" font-size="10" fill="#2c3e50">Cuello</text>

    <rect x="100" y="30" width="14" height="14" rx="3" fill="#e74c3c"/>
    <text x="122" y="41" font-family="system-ui" font-size="10" fill="#2c3e50">Hombros (L/R)</text>

    <rect x="0" y="55" width="14" height="14" rx="3" fill="#e67e22"/>
    <text x="22" y="66" font-family="system-ui" font-size="10" fill="#2c3e50">Espalda alta</text>

    <rect x="100" y="55" width="14" height="14" rx="3" fill="#f39c12"/>
    <text x="122" y="66" font-family="system-ui" font-size="10" fill="#2c3e50">Codos (L/R)</text>

    <rect x="0" y="80" width="14" height="14" rx="3" fill="#9b59b6"/>
    <text x="22" y="91" font-family="system-ui" font-size="10" fill="#2c3e50">Muñecas/manos</text>

    <rect x="100" y="80" width="14" height="14" rx="3" fill="#e74c3c"/>
    <text x="122" y="91" font-family="system-ui" font-size="10" fill="#2c3e50">Espalda baja</text>

    <rect x="0" y="105" width="14" height="14" rx="3" fill="#3498db"/>
    <text x="22" y="116" font-family="system-ui" font-size="10" fill="#2c3e50">Caderas/muslos</text>

    <rect x="100" y="105" width="14" height="14" rx="3" fill="#27ae60"/>
    <text x="122" y="116" font-family="system-ui" font-size="10" fill="#2c3e50">Rodillas</text>

    <rect x="0" y="130" width="14" height="14" rx="3" fill="#1abc9c"/>
    <text x="22" y="141" font-family="system-ui" font-size="10" fill="#2c3e50">Tobillos/pies</text>

    <text x="0" y="175" font-family="system-ui" font-size="10" fill="#5d6d7e">Preguntas por región:</text>
    <text x="0" y="192" font-family="system-ui" font-size="9" fill="#5d6d7e">• ¿Molestias en últimos 12 meses?</text>
    <text x="0" y="207" font-family="system-ui" font-size="9" fill="#5d6d7e">• ¿Molestias en últimos 7 días?</text>
    <text x="0" y="222" font-family="system-ui" font-size="9" fill="#5d6d7e">• ¿Interferencia con actividades?</text>
    <text x="0" y="237" font-family="system-ui" font-size="9" fill="#5d6d7e">• ¿Absentismo laboral?</text>
  </g>
</svg>
